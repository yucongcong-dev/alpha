# ============================================================================
# Runtime path / sentinel / string defaults
# ============================================================================
# File naming conventions, status strings, API payload keys, and misc constants.

sentinel:
  unknown: "UNKNOWN"
  unknown_check: "UNKNOWN"
  unknown_status: "unknown"
  preferred_field_rank: 999
  default_settings_variant_budget: 3
  unknown_family: "other"

misc:
  months_per_year: 12
  payload_text_truncation_limit: 500
  stable_fingerprint_hex_len: 16
  blacklist_schema_version: "v2"
  date_format_iso: "%Y-%m-%d"
  date_format_iso_minutes: "%Y-%m-%d %H:%M"

paths:
  credentials_dir: ".credentials"
  cache_dir: "cache"
  results_dir: "results"
  data_dir: "data"
  credentials_filename: "worldquant_brain_credentials.json"
  credentials_key_filename: "worldquant_brain_credentials.key"
  template_library_subpath: "templates"
  library_filename: "library.json"
  fields_cache_filename: "fields.json"
  default_results_filename: "test_results.json"
  analysis_suffix: "_analysis.json"
  results_journal_suffix: "_results.jsonl"
  state_suffix: "_state.json"
  checkpoint_suffix: "_checkpoint.json"
  log_suffix: ".log"

strings:
  api_keys:
    detail: "detail"
    error: "error"
    message: "message"
    status: "status"
    failed: "failed"
    progress: "progress"
    state: "state"
  status:
    submitted: "submitted"
    simulated: "simulated"
    error: "error"
  stat_fields:
    attempted: "attempted"
    submittable: "submittable"
    submitted: "submitted"
    errors: "errors"
    simulated: "simulated"
    queue_timeouts: "queue_timeouts"
    low_sharpe: "low_sharpe"
    low_fitness: "low_fitness"
    concentrated_weight: "concentrated_weight"
    low_sub_universe_sharpe: "low_sub_universe_sharpe"
    failed_check_counts: "failed_check_counts"
    top_failed_checks: "top_failed_checks"
    template_name: "template_name"
    field_id: "field_id"
    field_name: "field_name"
    field_type: "field_type"
    attempted_templates: "attempted_templates"
  check_names:
    low_sharpe: "LOW_SHARPE"
    low_turnover: "LOW_TURNOVER"
    low_fitness: "LOW_FITNESS"
    low_sub_universe_sharpe: "LOW_SUB_UNIVERSE_SHARPE"
    concentrated_weight: "CONCENTRATED_WEIGHT"
    high_turnover: "HIGH_TURNOVER"
  template_stages:
    first_order: "first_order"
    group_second_order: "group_second_order"
