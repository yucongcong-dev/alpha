# ============================================================================
# expression_policies.yaml — 数据集表达式策略覆盖
# ============================================================================
# 这部分用于承接"原先只能在 config.py 里改的表达式搜索常量"。
# 代码仍提供内置默认值，但以下配置可按数据集覆盖，用于：
#   - partner / ratio 搜索偏好
#   - 模板优先级加成与降权
#   - 字段排序与过滤阈值
#   - 各类弱模板/保护模板名单
# 如果某个键未配置，继续使用代码内默认值。
# ============================================================================

expression_policies:
  # --------------------------------------------------------------------------
  # __default__ — 所有数据集的通用优先级 tier 定义
  # --------------------------------------------------------------------------
  __default__:
    priority_tiers:
      account_boost: 820          # account_ 前缀模板加成
      high_conviction_boost: 780  # 高信心 ratio 模板加成
      heavy_penalty: -820         # 噪音过高模板
      deep_penalty: -760          # delta_ 前缀降权
      moderate_penalty: -260      # 中等降权
      light_penalty: -240         # 较轻降权
      mild_penalty: -220          # 轻微降权
      minor_penalty: -200         # 微小降权
      small_penalty: -180         # 极轻降权

  # --------------------------------------------------------------------------
  # fundamental6 — 季度财报数据
  # --------------------------------------------------------------------------
  fundamental6:
    use_curated_heuristics: true
    partner_limit: 6
    default_field_transform:
      stages: []
      backfill_window: 0
    matrix_field_transform:
      stages:
        - kind: "backfill"
          window: 120
        - kind: "winsorize"
          std: 4
      backfill_window: 120
    vector_field_transform:
      stages:
        - kind: "backfill"
          window: 120
        - kind: "winsorize"
          std: 4
      backfill_window: 120
    ratio_numerator_transform:
