# ============================================================================
# API / HTTP defaults
# ============================================================================
# Stable service endpoints, request headers, timeout, and retry-backoff defaults.
# User-facing runtime overrides still belong in settings.yaml under global.http.

api:
  base_url: "https://api.worldquantbrain.com"
  auth_url: "{base}/authentication"
  data_fields_url: "{base}/data-fields"
  simulations_url: "{base}/simulations"
  alphas_url: "{base}/alphas"
  default_rate_limit_max_retries: 3
  headers:
    default:
      Accept: "application/json"
      Content-Type: "application/json"
    version:
      Accept: "application/json;version=2.0"
    simulation:
      Accept: "application/json;version=3.0"

http:
  request_timeout: 90.0
  rate_limit_default_wait: 10.0
  polling_default_wait: 5.0
  polling_no_retry_after_wait: 1.5
  server_error_backoff_max: 30.0
  server_error_backoff_step: 3.0
  retry_operation_default_wait: 2.0
  login_retry_wait: 3.0
  simulation_retry_wait: 3.0
  polling_retry_buffer: 0.5
