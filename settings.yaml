      backfill_window: 504
    feedback_loop_policy:
      generate:
        min_attempted_templates: 0
        min_best_score: -999.0
        settings_variant_budget: 1
      prune:
        min_attempted_templates: 2
        min_best_score: -999.0
        settings_variant_budget: 2
        enable_template_pruning: true
      resimulate:
